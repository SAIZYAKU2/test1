<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダンス隊列ビューア</title>

<style>
  body { font-family: "Meiryo UI", sans-serif; margin: 0; background: #f5f5f5; }

  /* 全体レイアウト */
#top-controls {
  display:flex;
  justify-content:space-between;
  padding:6px 10px;
  background:#fff;
  border-bottom:1px solid #ccc;
  font-size:14px;
}

#stage-container {
  padding:0;
  background:#ddd;
  text-align:center;
}

#timeline {
  padding:4px 10px;
  background:#fff;
  border-top:1px solid #ccc;
}

#formation-list {
  display:flex;
  gap:8px;
  padding:8px;
  overflow-x:auto;
  background:#fafafa;
  border-top:1px solid #ccc;
}

.formation-thumb {
  width:80px;
  height:60px;
  background:#eee;
  border:1px solid #ccc;
  border-radius:4px;
  flex-shrink:0;
}

.formation-thumb.add {
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  color:#666;
}

  button { padding: 6px 14px; }
  input { padding: 4px; width: 70px; }
</style>
</head>
<body>

<!-- 上：設定エリア -->
<div id="top-controls">
  <div class="group">
    人数：<input type="number" id="numPeople" value="20">
    横(m)：<input type="number" id="wMeter" value="9">
    縦(m)：<input type="number" id="hMeter" value="5.4">
  </div>

  <div class="group">
    <button id="applyBtn">更新</button>
    <button id="resetBtn">リセット</button>
    <button id="pathToggle">動線</button>
    <button id="formationMode">作成</button>
  </div>
</div>

<div id="stage-container">
  <canvas id="stage"></canvas>
</div>

<div id="timeline">
  <input type="range" id="musicBar" min="0" max="180" value="0">
</div>

<div id="formation-list">
  <div class="formation-thumb"></div>
  <div class="formation-thumb"></div>
  <div class="formation-thumb"></div>
  <div class="formation-thumb add">＋</div>
</div>

<script>
// ここに今までの Canvas コードをそのまま入れる（後で統合）
</script>

</body>
</html>
