<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダンス隊列移動シミュレーター</title>

<style>
/* ================================
   1. 基本スタイル
   ================================ */
body {
  font-family: "Meiryo UI", sans-serif;
  margin: 0;
  background: #f5f5f5;
}

header {
  padding: 8px 12px;
  background: #333;
  color: #fff;
  font-size: 14px;
}

/* ================================
   2. 上部パネル
   ================================ */
#topPanel {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 8px 12px;
  background: #fafafa;
  border-bottom: 1px solid #ddd;
  font-size: 13px;
  position: relative;
  z-index: 10;
}

#topPanel input[type="number"] {
  width: 70px;
  padding: 4px;
}

#topPanel button {
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
}

/* ================================
   3. メインレイアウト
   ================================ */
#mainLayout {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 60px); /* ★余白を少し減らす */
}

/* ================================
   4. ステージ（4:3）
   ================================ */
#stageWrapper {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start; /* ★上に詰める */
  background: #e0e0e0;
  overflow: hidden;
}

#stage {
  background: #fff;
  border: 1px solid #ccc;
  touch-action: none;

  /* ★CanvasをCSSで縮小しない */
  width: 600px;   /* ★白枠を小さくする */
  height: 450px;  /* ★4:3維持 */
}

/* ================================
   5. 曲バー
   ================================ */
#timeline {
  height: 50px;
  padding: 6px 12px;
  background: #fdfdfd;
  border-top: 1px solid #ddd;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
}

#timeline input[type="range"] {
  flex: 1;
}

/* ================================
   6. フォーメーション一覧
   ================================ */
#formationList {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 8px 12px;
  background: #fafafa;
  border-top: 1px solid #ddd;
  overflow-x: hidden;
  justify-content: flex-start;
}

.formation-item {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 4px;
  border: 1px solid #bbb;
  background: #fff;
  cursor: pointer;
}

.formation-item.active {
  background: #3498db;
  color: #fff;
  border-color: #2980b9;
}
</style>
</head>
<body>

<header>ダンス隊列移動シミュレーター</header>

<!-- ================================
     7. 上部パネルHTML
     ================================ -->
<div id="topPanel">
  <div>
    人数：<input type="number" id="numPeople" value="20" min="1" max="200">
  </div>
  <div>
    横(m)：<input type="number" id="wMeter" value="12" step="0.1">
  </div>
  <div>
    縦(m)：<input type="number" id="hMeter" value="9" step="0.1">
  </div>

  <button id="applyStageBtn">ステージ更新</button>
  <button id="resetStageBtn">リセット</button>
  <button id="addFormationBtn">フォーメーション追加</button>
</div>

<!-- ================================
     8. メインレイアウトHTML
     ================================ -->
<div id="mainLayout">

  <!-- 8-1. ステージ -->
  <div id="stageWrapper">
    <canvas id="stage"></canvas>
  </div>

  <!-- 8-2. 曲バー -->
  <div id="timeline">
    <span>曲位置：</span>
    <input type="range" id="songSlider" min="0" max="180" value="0">
    <span id="songTimeLabel">0.0s</span>
  </div>

  <!-- 8-3. フォーメーション一覧 -->
  <div id="formationList"></div>
</div>

<script>
/* ================================
   9. Canvas 初期設定
   ================================ */
const canvas = document.getElementById("stage");
canvas.width = 800;
canvas.height = 600;
const ctx = canvas.getContext("2d");

const METER_TO_PX = 100;

/* ================================
   10. ステージ設定
   ================================ */
let stageWidthM = 12;
let stageHeightM = 9;

let stageWidth = stageWidthM * METER_TO_PX;
let stageHeight = stageHeightM * METER_TO_PX;

let scale = 1;
let offsetX = 0;
let offsetY = 0;

/* ================================
   11. ダンサー設定
   ================================ */
let personRadiusM = 0.5;
let personRadiusPx = personRadiusM * METER_TO_PX;

let dancers = [];

/* ================================
   12. フォーメーション管理
   ================================ */
let formations = [];
let currentFormationId = null;

/* ================================
   13. ステージフィット（高さ優先＋上下少し余白＋横パン調整）
   ================================ */
function fitStageToScreen() {

  const margin = 10;  // ★上下に少しだけ残す余白（弱さんの希望）

  // ★高さ優先でフィット（上下に余白を残す）
  const availableHeight = canvas.height - margin * 2;
  const scaleY = availableHeight / stageHeight;

  // ★横方向のフィットも計算（はみ出す場合のパン調整に使う）
  const scaleX = canvas.width / stageWidth;

  // ★高さ優先（弱さんの希望）
  scale = scaleY;

  // ★上下は margin だけ残してぴったり
  offsetY = margin;

  // ★横方向のステージ幅（スケール後）
  const scaledStageWidth = stageWidth * scale;

  if (scaledStageWidth <= canvas.width) {
    // ★横が収まる → 中央に配置
    offsetX = (canvas.width - scaledStageWidth) / 2;
  } else {
    // ★横がはみ出す → 自動で中央にパンして見切れ防止
    offsetX = (canvas.width - scaledStageWidth) / 2;
  }
}

/* ================================
   14. ダンサー均等配置
   ================================ */
function generateDancers() {
  const N = parseInt(document.getElementById("numPeople").value);
  dancers = [];

  const cols = Math.ceil(Math.sqrt(N * (stageWidth / stageHeight)));
  const rows = Math.ceil(N / cols);

  const cellW = stageWidth / cols;
  const cellH = stageHeight / rows;

  for (let i = 0; i < N; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);

    dancers.push({
      id: i + 1,
      x: (col + 0.5) * cellW,
      y: (row + 0.5) * cellH,
      color: "#3498db"
    });
  }
}

/* ================================
   15. 描画
   ================================ */
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  ctx.fillStyle = "#f0f0f0";
  ctx.fillRect(0, 0, stageWidth, stageHeight);

  ctx.strokeStyle = "#999";
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, stageWidth, stageHeight);

  dancers.forEach(d => {
    ctx.beginPath();
    ctx.arc(d.x, d.y, personRadiusPx, 0, Math.PI * 2);
    ctx.fillStyle = d.color;
    ctx.fill();

    ctx.font = "20px Meiryo UI";
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(d.id, d.x, d.y);
  });

  ctx.restore();
}

/* ================================
   16. 当たり判定（Canvas座標変換）
   ================================ */
function hitTestCanvas(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const x = clientX - rect.left;
  const y = clientY - rect.top;

  const invX = (x - offsetX) / scale;
  const invY = (y - offsetY) / scale;

  for (let d of dancers) {
    const dx = invX - d.x;
    const dy = invY - d.y;
    if (dx * dx + dy * dy <= personRadiusPx * personRadiusPx) return d;
  }
  return null;
}

/* ================================
   17. ドラッグ操作（マウス）
   ================================ */
let dragging = null;

canvas.addEventListener("mousedown", e => {
  dragging = hitTestCanvas(e.clientX, e.clientY);
});

canvas.addEventListener("mousemove", e => {
  if (!dragging) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  dragging.x = (x - offsetX) / scale;
  dragging.y = (y - offsetY) / scale;
  draw();
});

canvas.addEventListener("mouseup", () => {
  dragging = null;
});

canvas.addEventListener("mouseleave", () => {
  dragging = null;
});

/* ================================
   18. ドラッグ操作（タッチ）
   ================================ */
let lastDist = 0;
let lastCx = 0;
let lastCy = 0;

canvas.addEventListener("touchstart", e => {
  const rect = canvas.getBoundingClientRect();

  if (e.touches.length === 1) {
    dragging = hitTestCanvas(e.touches[0].clientX, e.touches[0].clientY);
  }

  if (e.touches.length === 2) {
    lastDist = getDist(e);
    const c = getCenter(e, rect);
    lastCx = c.x;
    lastCy = c.y;
  }
});

canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();

  if (e.touches.length === 1 && dragging) {
    const x = e.touches[0].clientX - rect.left;
    const y = e.touches[0].clientY - rect.top;

    dragging.x = (x - offsetX) / scale;
    dragging.y = (y - offsetY) / scale;
    draw();
  }

  if (e.touches.length === 2) {
    const newDist = getDist(e);
    const c = getCenter(e, rect);

    const worldX = (c.x - offsetX) / scale;
    const worldY = (c.y - offsetY) / scale;

    scale *= newDist / lastDist;
    lastDist = newDist;

    offsetX = c.x - worldX * scale;
    offsetY = c.y - worldY * scale;

    offsetX += (c.x - lastCx);
    offsetY += (c.y - lastCy);

    lastCx = c.x;
    lastCy = c.y;

    draw();
  }
});

canvas.addEventListener("touchend", () => {
  dragging = null;
});

function getDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function getCenter(e, rect) {
  const x = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
  const y = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
  return { x, y };
}

/* ================================
   19. フォーメーション追加
   ================================ */
document.getElementById("addFormationBtn").addEventListener("click", () => {
  const sec = parseFloat(songSlider.value);

  const id = Date.now();
  const name = "F" + formations.length;

  formations.push({
    id,
    name,
    timeSec: sec,
    positions: dancers.map(d => ({
      id: d.id,
      x: d.x,
      y: d.y,
      color: d.color
    }))
  });

  addFormationButton(id, name, sec);
});

/* ================================
   20. フォーメーションボタン追加
   ================================ */
const formationListDiv = document.getElementById("formationList");

function addFormationButton(id, name, sec) {
  const btn = document.createElement("button");
  btn.className = "formation-item";
  btn.dataset.id = id;
  btn.textContent = `${name} (${sec.toFixed(1)}s)`;

  btn.addEventListener("click", () => {
    selectFormation(id);
  });

  formationListDiv.appendChild(btn);
}

/* ================================
   21. フォーメーション反映
   ================================ */
function selectFormation(id) {
  currentFormationId = id;
  const f = formations.find(f => f.id === id);
  if (!f) return;

  document.querySelectorAll(".formation-item").forEach(el => {
    el.classList.toggle("active", parseInt(el.dataset.id) === id);
  });

  f.positions.forEach(p => {
    const d = dancers.find(d => d.id === p.id);
    if (d) {
      d.x = p.x;
      d.y = p.y;
      d.color = p.color;
    }
  });

  songSlider.value = f.timeSec;
  songTimeLabel.textContent = f.timeSec.toFixed(1) + "s";

  draw();
}

/* ================================
   22. 曲バー更新イベント
   ================================ */
const songSlider = document.getElementById("songSlider");
const songTimeLabel = document.getElementById("songTimeLabel");

songSlider.addEventListener("input", () => {
  const sec = parseFloat(songSlider.value);
  songTimeLabel.textContent = sec.toFixed(1) + "s";
});

/* ================================
   23. ステージ更新・リセット
   ================================ */
document.getElementById("applyStageBtn").addEventListener("click", () => {
  stageWidthM = parseFloat(document.getElementById("wMeter").value);
  stageHeightM = parseFloat(document.getElementById("hMeter").value);

  stageWidth = stageWidthM * METER_TO_PX;
  stageHeight = stageHeightM * METER_TO_PX;

  personRadiusPx = personRadiusM * METER_TO_PX;

  generateDancers();
  fitStageToScreen();
  draw();
});

document.getElementById("resetStageBtn").addEventListener("click", () => {
  document.getElementById("numPeople").value = 20;
  document.getElementById("wMeter").value = 12;
  document.getElementById("hMeter").value = 9;

  stageWidthM = 12;
  stageHeightM = 9;
  stageWidth = stageWidthM * METER_TO_PX;
  stageHeight = stageHeightM * METER_TO_PX;

  personRadiusPx = personRadiusM * METER_TO_PX;

  generateDancers();
  fitStageToScreen();
  draw();
});

/* ================================
   24. 初期化
   ================================ */
generateDancers();
fitStageToScreen();
draw();
</script>

</body>
</html>
