<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダンス隊列ビューア</title>

<style>
  body { font-family: "Meiryo UI", sans-serif; margin: 0; background: #f5f5f5; }
  #stage { background: white; border: 1px solid #ccc; display: block; margin: auto; touch-action: none; }
  #controls { text-align:center; margin:10px; }
  input { width:80px; padding:5px; }
  button { padding:8px 20px; margin-left:10px; }
</style>
</head>
<body>

<h3 style="text-align:center;">ダンス隊列ビューア（人数・ステージ入力＋均等配置＋ピンチズーム）</h3>

<div id="controls">
  人数：<input type="number" id="numPeople" value="20" min="1" max="200">
  横(m)：<input type="number" id="wMeter" value="9" step="0.1">
  縦(m)：<input type="number" id="hMeter" value="5.4" step="0.1">
  <button id="applyBtn">ステージ更新</button>
  <button id="resetBtn">リセット</button>
</div>

<canvas id="stage" width="360" height="500"></canvas>

<script>
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");

// 1m = 100px
const METER_TO_PX = 100;

// ステージサイズ（初期値：9m × 5.4m）
let stageWidth = 9 * METER_TO_PX;
let stageHeight = 5.4 * METER_TO_PX;

// 人の半径（m）
let personRadiusM = 0.5;
let personRadiusPx = personRadiusM * METER_TO_PX;

// ダンサー配列
let dancers = [];

// ステージに均等配置
function generateDancers() {
  const N = parseInt(document.getElementById("numPeople").value);
  dancers = [];

  // ステージの縦横比に合わせた最適グリッド
  const cols = Math.ceil(Math.sqrt(N * (stageWidth / stageHeight)));
  const rows = Math.ceil(N / cols);

  const cellW = stageWidth / cols;
  const cellH = stageHeight / rows;

  for (let i = 0; i < N; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);

    dancers.push({
      id: i + 1,
      x: (col + 0.5) * cellW,
      y: (row + 0.5) * cellH
    });
  }
}

// ズームとパン
let scale = 1;
let offsetX = 0;
let offsetY = 0;

// ステージを画面にフィットさせる
function fitStageToScreen() {
  const scaleX = canvas.width / stageWidth;
  const scaleY = canvas.height / stageHeight;

  scale = Math.min(scaleX, scaleY);

  offsetX = (canvas.width  - stageWidth  * scale) / 2;
  offsetY = (canvas.height - stageHeight * scale) / 2;
}

// 文字サイズを最大化（青丸からはみ出ないように）
function getBestFontSize(text, radiusPx) {
  let size = radiusPx * 2; // 最大は直径
  ctx.font = size + "px Meiryo UI";

  while (ctx.measureText(text).width > radiusPx * 1.6) {
    size -= 1;
    ctx.font = size + "px Meiryo UI";
  }
  return size;
}

// 描画
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  // ステージ背景
  ctx.fillStyle = "#f0f0f0";
  ctx.fillRect(0, 0, stageWidth, stageHeight);

  // ステージ枠線
  ctx.strokeStyle = "#999";
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, stageWidth, stageHeight);

  // ダンサー
  dancers.forEach(d => {
    ctx.beginPath();
    ctx.arc(d.x, d.y, personRadiusPx, 0, Math.PI * 2);
    ctx.fillStyle = "#3498db";
    ctx.fill();

    // 文字最大化
    const fontSize = getBestFontSize(d.id, personRadiusPx);
    ctx.font = fontSize + "px Meiryo UI";
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(d.id, d.x, d.y);
  });

  ctx.restore();
}

generateDancers();
fitStageToScreen();
draw();

// 当たり判定
function hitTest(x, y) {
  const invX = (x - offsetX) / scale;
  const invY = (y - offsetY) / scale;

  for (let d of dancers) {
    const dx = invX - d.x;
    const dy = invY - d.y;
    if (dx * dx + dy * dy <= personRadiusPx * personRadiusPx) return d;
  }
  return null;
}

// PC：マウス操作
let dragging = null;

canvas.addEventListener("mousedown", e => {
  dragging = hitTest(e.offsetX, e.offsetY);
});

canvas.addEventListener("mousemove", e => {
  if (!dragging) return;

  dragging.x = (e.offsetX - offsetX) / scale;
  dragging.y = (e.offsetY - offsetY) / scale;
  draw();
});

canvas.addEventListener("mouseup", () => dragging = null);

// スマホ：タッチ操作
let lastDist = 0;
let lastCx = 0, lastCy = 0;

canvas.addEventListener("touchstart", e => {
  const rect = canvas.getBoundingClientRect();

  if (e.touches.length === 1) {
    const x = e.touches[0].clientX - rect.left;
    const y = e.touches[0].clientY - rect.top;
    dragging = hitTest(x, y);
  }

  if (e.touches.length === 2) {
    lastDist = getDist(e);
    const c = getCenter(e, rect);
    lastCx = c.x;
    lastCy = c.y;
  }
});

canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();

  // 1本指ドラッグ
  if (e.touches.length === 1 && dragging) {
    const x = e.touches[0].clientX - rect.left;
    const y = e.touches[0].clientY - rect.top;

    dragging.x = (x - offsetX) / scale;
    dragging.y = (y - offsetY) / scale;
    draw();
  }

  // 2本指ピンチ（ズーム＋パン）
  if (e.touches.length === 2) {
    const newDist = getDist(e);
    const c = getCenter(e, rect);

    // ズーム前の中心点の世界座標
    const worldX = (c.x - offsetX) / scale;
    const worldY = (c.y - offsetY) / scale;

    // スケール変更
    scale *= newDist / lastDist;
    lastDist = newDist;

    // ズーム後も同じ世界座標が中心に来るように補正
    offsetX = c.x - worldX * scale;
    offsetY = c.y - worldY * scale;

    // 2本指の移動量でパン
    offsetX += (c.x - lastCx);
    offsetY += (c.y - lastCy);

    lastCx = c.x;
    lastCy = c.y;

    draw();
  }
});

canvas.addEventListener("touchend", () => dragging = null);

// 2点間距離
function getDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

// 2点の中心
function getCenter(e, rect) {
  const x = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
  const y = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
  return { x, y };
}

// ステージ更新ボタン
document.getElementById("applyBtn").addEventListener("click", () => {
  const w = parseFloat(document.getElementById("wMeter").value);
  const h = parseFloat(document.getElementById("hMeter").value);

  stageWidth = w * METER_TO_PX;
  stageHeight = h * METER_TO_PX;

  personRadiusPx = personRadiusM * METER_TO_PX;

  generateDancers();
  fitStageToScreen();
  draw();
});

// リセットボタン
document.getElementById("resetBtn").addEventListener("click", () => {
  generateDancers();
  fitStageToScreen();
  draw();
});
</script>

</body>
</html>
