<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダンス隊列ビューア</title>
<style>
  body { font-family: "Meiryo UI", sans-serif; background: #f5f5f5; margin: 0; }
  #stage { background: white; border: 1px solid #ccc; display: block; margin: auto; }
</style>
</head>
<body>
<h3 style="text-align:center;">ダンス隊列ビューア</h3>
<canvas id="stage" width="360" height="300"></canvas>

<script>
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");
for (let i = 0; i < 20; i++) {
  const x = 40 + (i % 10) * 30;
  const y = 40 + Math.floor(i / 10) * 60;
  ctx.beginPath();
  ctx.arc(x, y, 10, 0, Math.PI * 2);
  ctx.fillStyle = "#3498db";
  ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.font = "10px Meiryo UI";
  ctx.fillText(i + 1, x - 4, y + 3);
}
</script>
</body>
</html>
