<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ドラッグ最小版（IE WebBrowser 完全対応）</title>
<style>
  body { margin: 0; overflow: hidden; background: #ccc; }
  canvas { display: block; }
</style>
</head>
<body>

<canvas id="stage" width="800" height="600"></canvas>

<script>
// --- IE互換のため var を使用 ---
var canvas = document.getElementById("stage");
var ctx = canvas.getContext("2d");

// --- ★Canvas 背景を JS で塗る（最重要） ---
function fillBackground() {
  ctx.fillStyle = "#f0f0f0";   // 不透明色
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// --- ドラッグ対象の円 ---
var circle = { x: 200, y: 200, r: 40 };
var dragging = false;

// --- 描画 ---
function draw() {
  fillBackground();  // ← 背景を毎回塗る（IE対策）

  ctx.beginPath();
  ctx.arc(circle.x, circle.y, circle.r, 0, Math.PI * 2);
  ctx.fillStyle = "#3498db";
  ctx.fill();
}

// --- 当たり判定 ---
function hitTest(px, py) {
  var dx = px - circle.x;
  var dy = py - circle.y;
  return (dx*dx + dy*dy <= circle.r * circle.r);
}

// --- マウス座標取得（IE互換） ---
function getPos(e) {
  var rect = canvas.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

// --- ドラッグ開始 ---
canvas.onmousedown = function(e) {
  var pos = getPos(e);
  if (hitTest(pos.x, pos.y)) {
    dragging = true;
  }
};

// --- ドラッグ中 ---
canvas.onmousemove = function(e) {
  if (!dragging) return;

  var pos = getPos(e);
  circle.x = pos.x;
  circle.y = pos.y;

  draw();
};

// --- ドラッグ終了 ---
canvas.onmouseup = function() { dragging = false; };
canvas.onmouseleave = function() { dragging = false; };

// --- 初期描画 ---
draw();
</script>

</body>
</html>
