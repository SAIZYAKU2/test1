<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ドラッグ最小版（IE WebBrowser 対策）</title>
<style>
  body { margin: 0; background: #ccc; }
  #wrapper { position: relative; width: 800px; height: 600px; margin: 20px auto; }
  #stage {
    position: absolute;
    left: 0; top: 0;
    width: 800px; height: 600px;
    background: #f0f0f0;
  }
  #overlay {
    position: absolute;
    left: 0; top: 0;
    width: 800px; height: 600px;
    background: rgba(0,0,0,0); /* 完全透明 */
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="wrapper">
  <canvas id="stage" width="800" height="600"></canvas>
  <div id="overlay"></div> <!-- ★ここがイベントを受け取る -->
</div>

<script>
var canvas = document.getElementById("stage");
var ctx = canvas.getContext("2d");
var overlay = document.getElementById("overlay");

// --- ドラッグ対象の円 ---
var circle = { x: 200, y: 200, r: 40 };
var dragging = false;

// --- 描画 ---
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.beginPath();
  ctx.arc(circle.x, circle.y, circle.r, 0, Math.PI * 2);
  ctx.fillStyle = "#3498db";
  ctx.fill();
}

// --- 当たり判定 ---
function hitTest(px, py) {
  var dx = px - circle.x;
  var dy = py - circle.y;
  return (dx*dx + dy*dy <= circle.r * circle.r);
}

// --- マウス座標取得 ---
function getPos(e) {
  var rect = overlay.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

// --- ドラッグ開始（overlay が受け取る） ---
overlay.onmousedown = function(e) {
  var pos = getPos(e);
  if (hitTest(pos.x, pos.y)) {
    dragging = true;
  }
};

// --- ドラッグ中 ---
overlay.onmousemove = function(e) {
  if (!dragging) return;

  var pos = getPos(e);
  circle.x = pos.x;
  circle.y = pos.y;

  draw();
};

// --- ドラッグ終了 ---
overlay.onmouseup = function() { dragging = false; };
overlay.onmouseleave = function() { dragging = false; };

// --- 初期描画 ---
draw();
</script>

</body>
</html>
